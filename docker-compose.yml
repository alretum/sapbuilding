services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crc}
      POSTGRES_DB: ${POSTGRES_DB:-crc}
    # Bound to localhost only: lets you run `npm run dev` / Prisma from the host
    # during development, while never exposing Postgres beyond the VPS itself.
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crc} -d ${POSTGRES_DB:-crc}"]
      interval: 5s
      timeout: 5s
      retries: 12

  web:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-crc}:${POSTGRES_PASSWORD:-crc}@db:5432/${POSTGRES_DB:-crc}
      NODE_ENV: production
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-:80}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  db_data:
  caddy_data:
  caddy_config:
